# AgentScope 模型配置
# 密钥请配置在 .env 文件中

# 默认模型配置 (OpenAI兼容API)
default_model:
  model_name: glm-5
  base_url: https://api.z.ai/api/coding/paas/v4
  # api_key 从环境变量 LLM_API_KEY 读取
  generate_args:
    temperature: 0.7
    top_p: 0.9
    max_tokens: 2000

# Skills 配置
skills:
  # 支持多个目录，用逗号分隔
  # 示例: skills,/path/to/custom/skills
  dirs: skills

# Redis 配置
redis:
  host: localhost
  port: 6379
  db: 0
  password: null  # 如果有密码请配置
  connect_timeout: 5
  socket_timeout: 5

# 状态管理配置
state_management:
  session_expire_hours: 24
  dialog_history_limit: 100
  skill_context_expire_hours: 12
  enable_persistence: true

